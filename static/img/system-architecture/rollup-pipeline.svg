<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- Top row: happy path A -> B -> C -> E -->

  <!-- A -->
  <rect x="30" y="60" width="150" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="105" y="85" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE A</text>
  <text x="105" y="112" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">commitBatch</text>

  <!-- B -->
  <rect x="210" y="60" width="150" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="285" y="85" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE B</text>
  <text x="285" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">submitBlobs</text>
  <text x="285" y="132" text-anchor="middle" fill="#a0a0a0" font-size="11" font-style="italic">EIP-4844 DA</text>

  <!-- C -->
  <rect x="390" y="60" width="170" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="475" y="85" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE C</text>
  <text x="475" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">preconfirmBatch</text>
  <text x="475" y="132" text-anchor="middle" fill="#a0a0a0" font-size="11" font-style="italic">Nitro TEE + SP1</text>

  <!-- E (delay-based) -->
  <rect x="770" y="60" width="180" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="860" y="85" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE E</text>
  <text x="860" y="110" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">finalizeBatches</text>
  <text x="860" y="132" text-anchor="middle" fill="#a0a0a0" font-size="11" font-style="italic">delay-based</text>

  <!-- Happy-path arrows -->
  <line x1="180" y1="105" x2="208" y2="105" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="105" x2="388" y2="105" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="105" x2="768" y2="105" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Branch: C -> D (disputed, dashed) -->
  <line x1="475" y1="150" x2="475" y2="238" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="485" y="200" fill="#e5e5e5" font-size="12" font-style="italic">disputed</text>

  <!-- D -->
  <rect x="390" y="240" width="170" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="475" y="265" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE D</text>
  <text x="475" y="288" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">challengeBatchRoot</text>
  <text x="475" y="308" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">challengeBlock</text>

  <!-- D -> E2 (SP1 proof) -->
  <line x1="560" y1="285" x2="658" y2="285" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="609" y="278" text-anchor="middle" fill="#e5e5e5" font-size="12">SP1 proof</text>

  <!-- E2 (proof-gated) -->
  <rect x="660" y="240" width="180" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="750" y="265" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">STAGE E</text>
  <text x="750" y="290" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">finalizeWithProofs</text>
  <text x="750" y="312" text-anchor="middle" fill="#a0a0a0" font-size="11" font-style="italic">proof-gated</text>

  <!-- D -> Halt (unresolved, dashed) -->
  <line x1="475" y1="330" x2="475" y2="418" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <text x="485" y="380" fill="#e5e5e5" font-size="12" font-style="italic">unresolved</text>

  <!-- Halt -->
  <rect x="390" y="420" width="170" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="475" y="445" text-anchor="middle" fill="#a0a0a0" font-size="11" letter-spacing="1">SAFETY HALT</text>
  <text x="475" y="468" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">_rollupCorrupted</text>
  <text x="475" y="488" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">revertBatches</text>
</svg>
