<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="240" y="24" text-anchor="middle" fill="#a0a0a0" font-size="12" letter-spacing="2">L1 · ETHEREUM</text>
  <text x="760" y="24" text-anchor="middle" fill="#a0a0a0" font-size="12" letter-spacing="2">L2 · FLUENT</text>

  <!-- Center separator -->
  <line x1="500" y1="15" x2="500" y2="465" stroke="#444444" stroke-width="1" stroke-dasharray="3,6"/>

  <!-- Row 1: Gateways -->
  <rect x="60" y="45" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="240" y="77" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">L1 Gateway</text>
  <text x="240" y="100" text-anchor="middle" fill="#a0a0a0" font-size="12">NativeGateway · ERC20Gateway</text>

  <rect x="580" y="45" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="760" y="77" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">L2 Gateway</text>
  <text x="760" y="100" text-anchor="middle" fill="#a0a0a0" font-size="12">NativeGateway · ERC20Gateway</text>

  <!-- Row 2: Bridge core -->
  <rect x="60" y="185" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="240" y="217" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">L1FluentBridge</text>
  <text x="240" y="240" text-anchor="middle" fill="#a0a0a0" font-size="12">queue · proof verify · rollup hook</text>

  <rect x="580" y="185" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="760" y="217" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">L2FluentBridge</text>
  <text x="760" y="240" text-anchor="middle" fill="#a0a0a0" font-size="12">receive · fee · expiry check</text>

  <!-- Row 3: Settlement context -->
  <rect x="60" y="325" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="240" y="357" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Rollup</text>
  <text x="240" y="380" text-anchor="middle" fill="#a0a0a0" font-size="12">commitBatch · cursor · corruption</text>

  <rect x="580" y="325" width="360" height="80" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="760" y="357" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">L1 Oracles (on L2)</text>
  <text x="760" y="380" text-anchor="middle" fill="#a0a0a0" font-size="12">L1BlockOracle · L1GasOracle</text>

  <!-- Vertical arrows within L1 column: Gateway <-> Bridge -->
  <line x1="220" y1="125" x2="220" y2="183" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="185" x2="260" y2="127" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical arrows within L1 column: Bridge <-> Rollup -->
  <line x1="220" y1="265" x2="220" y2="323" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="325" x2="260" y2="267" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical arrows within L2 column: Gateway <-> Bridge -->
  <line x1="740" y1="125" x2="740" y2="183" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="185" x2="780" y2="127" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical arrow within L2: Bridge reads from Oracles (one-way) -->
  <line x1="760" y1="325" x2="760" y2="267" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Cross-chain: L1Bridge -> L2Bridge (deposit, via sequencer) -->
  <line x1="420" y1="210" x2="578" y2="210" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="499" y="202" text-anchor="middle" fill="#e5e5e5" font-size="12" font-style="italic">deposit (via sequencer)</text>

  <!-- Cross-chain: L2Bridge -> L1Bridge (withdrawal with proof) -->
  <line x1="580" y1="245" x2="422" y2="245" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="499" y="260" text-anchor="middle" fill="#e5e5e5" font-size="12" font-style="italic">withdrawal (proof vs batchRoot)</text>
</svg>
