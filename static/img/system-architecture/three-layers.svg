<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cccccc"/>
    </marker>
  </defs>

  <!-- Layer 1: Node / Consensus Shell -->
  <rect x="100" y="20" width="440" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="320" y="55" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Node / Consensus Shell</text>
  <text x="320" y="85" text-anchor="middle" fill="#a0a0a0" font-size="14">modified Reth · networking, mempool, RPC</text>

  <!-- Layer 2: Execution Coordination -->
  <rect x="100" y="185" width="440" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="320" y="220" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Execution Coordination</text>
  <text x="320" y="250" text-anchor="middle" fill="#a0a0a0" font-size="14">REVM + host handlers</text>

  <!-- Layer 3: Runtime Execution -->
  <rect x="100" y="350" width="440" height="90" rx="6" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <text x="320" y="385" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Runtime Execution</text>
  <text x="320" y="415" text-anchor="middle" fill="#a0a0a0" font-size="14">rWasm · contract &amp; system modes</text>

  <!-- Shell &lt;-&gt; Coord arrows -->
  <line x1="270" y1="110" x2="270" y2="184" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="185" x2="370" y2="111" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="152" text-anchor="end" fill="#e5e5e5" font-size="13">call</text>
  <text x="380" y="152" fill="#e5e5e5" font-size="13">commit</text>

  <!-- Coord &lt;-&gt; Runtime arrows -->
  <line x1="270" y1="275" x2="270" y2="349" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="350" x2="370" y2="276" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="317" text-anchor="end" fill="#e5e5e5" font-size="13">exec / resume</text>
  <text x="380" y="317" fill="#e5e5e5" font-size="13">interruption</text>
</svg>
